<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Auth | loginsee</title>
    <style>
        :root {
            --bg-dark: #0a0a0a; --panel-dark: #121212;
            --highlight: #00ff88; --border-dim: #333333;
            --font-mono: 'Consolas', 'Courier New', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-dark); color: var(--highlight); font-family: var(--font-mono); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        body::before { content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .auth-container { width: 400px; background: var(--panel-dark); border: 1px solid var(--border-dim); padding: 40px; position: relative; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); z-index: 3; }
        .auth-container::before { content: ""; position: absolute; top: -2px; left: -2px; width: 30px; height: 30px; border-top: 3px solid var(--highlight); border-left: 3px solid var(--highlight); }
        .auth-container::after { content: ""; position: absolute; bottom: -2px; right: -2px; width: 30px; height: 30px; border-bottom: 3px solid var(--highlight); border-right: 3px solid var(--highlight); }
        .auth-header { margin-bottom: 30px; }
        .auth-header h1 { font-size: 1.2rem; letter-spacing: 4px; }
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-size: 0.7rem; margin-bottom: 8px; letter-spacing: 1px; }
        input { width: 100%; background: #000; border: 1px solid var(--border-dim); padding: 12px; color: var(--highlight); font-family: var(--font-mono); outline: none; }
        input:focus { border-color: var(--highlight); }
        .btn-auth { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--highlight); color: var(--highlight); font-family: var(--font-mono); text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-auth:hover { background: var(--highlight); color: #000; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .denied-active { animation: shake 0.2s ease-in-out 0s 2; border-color: #ff4444 !important; }
    </style>
</head>
<body>
    <div class="auth-container" id="authBox">
        <div class="auth-header"><h1>SECURITY_GATE</h1><p style="font-size: 0.6rem; opacity: 0.5; margin-bottom: 20px;">CORE_SYSTEM // ACCESS_RESTRICTED</p></div>
        <form onsubmit="handleAuth(event)">
            <div class="input-group"><label>PERSONNEL_ID</label><input type="text" id="uid" required></div>
            <div class="input-group"><label>ACCESS_CRYPT</label><input type="password" id="ups" required></div>
            <button type="submit" class="btn-auth" id="btn">Initialize Link</button>
        </form>
    </div>
    <script>
        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const box = document.getElementById('authBox');
            const uidInput = document.getElementById('uid').value;
            const upsInput = document.getElementById('ups').value;
            btn.innerText = "VERIFYING...";
            try {
                const response = await fetch('members.json');
                const members = await response.json();
                const user = members.find(m => m.id === uidInput && m.password === upsInput);
                if(user) {
                    localStorage.setItem('currentSessionID', user.id);
                    window.location.href = "freshC.html";
                } else { throw new Error(); }
            } catch (err) {
                btn.innerText = "ACCESS_DENIED"; btn.style.color = "#ff4444"; btn.style.borderColor = "#ff4444";
                box.classList.add('denied-active');
                setTimeout(() => { 
                    btn.innerText = "Initialize Link"; btn.style.color = "var(--highlight)"; 
                    btn.style.borderColor = "var(--highlight)"; box.classList.remove('denied-active');
                }, 1500);
            }
        }
    </script>
</body>
</html>
