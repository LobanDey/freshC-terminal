<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>freshC | V10.0_OMNI_ARCHITECT</title>
    <style>
        :root {
            --bg-dark: #070707; --panel-dark: #111; --text-light: #e0e0e0;
            --highlight: #00ff88; --border-dim: #333; --font-mono: 'Consolas', 'Courier New', monospace;
            --star-gold: #ffd700; --danger-red: #ff4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: var(--font-mono); overflow: hidden; height: 100vh; }

        /* --- FIXED BACK BUTTON --- */
        .btn-back-fixed {
            position: fixed;
            top: 15px;
            left: 25px;
            z-index: 1000; /* Stays above everything */
            background: transparent;
            border: 1px solid var(--danger-red);
            color: var(--danger-red);
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-family: var(--font-mono);
            transition: 0.2s;
            background: rgba(0,0,0,0.8);
        }
        .btn-back-fixed:hover {
            background: var(--danger-red);
            color: #000;
            box-shadow: 0 0 15px var(--danger-red);
        }

        /* --- BOOT SEQUENCE --- */
        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; padding: 50px; color: var(--highlight); pointer-events: none; transition: opacity 0.6s ease-out; }
        .boot-line { margin-bottom: 5px; opacity: 0; animation: fadeIn 0.1s forwards; font-size: 0.9rem; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* --- HORIZONTAL TRANSITION ENGINE --- */
        .view-mode { position: fixed; inset: 0; transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1); background: var(--bg-dark); }
        #hub-layer { z-index: 10; transform: translateX(0); display: flex; flex-direction: column; }
        #ide-layer { z-index: 20; transform: translateX(100%); display: flex; flex-direction: column; }
        #architect-layer { z-index: 30; transform: translateX(100%); display: flex; flex-direction: column; background: #000; }
        
        body.ide-active #ide-layer { transform: translateX(0); }
        body.architect-active #architect-layer { transform: translateX(0); }

        /* --- SHARED UI --- */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 0 25px 0 160px; border-bottom: 1px solid var(--highlight); background: var(--panel-dark); height: 60px; flex-shrink: 0; }
        .btn-system { background: transparent; border: 1px solid var(--highlight); color: var(--highlight); padding: 8px 15px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; font-family: var(--font-mono); transition: 0.2s; }
        .btn-system:hover:not(:disabled) { background: var(--highlight); color: #000; box-shadow: 0 0 10px var(--highlight); }
        .tool-input { width: 100%; background: #000; border: 1px solid #333; color: var(--highlight); padding: 8px; margin: 5px 0; font-family: var(--font-mono); font-size: 0.7rem; outline: none; }

        /* --- HUB & GRID --- */
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; padding: 40px; overflow-y: auto; flex-grow: 1; }
        .card { background: #0a0a0a; border: 1px solid var(--border-dim); padding: 25px; cursor: pointer; transition: 0.3s; position: relative; height: 160px; display: flex; flex-direction: column; justify-content: center; }
        .card:hover { border-color: var(--highlight); transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,255,136,0.1); }
        .card.starred { border-left: 4px solid var(--star-gold); }
        .card h3 { color: var(--highlight); font-size: 1rem; margin-bottom: 8px; text-transform: uppercase; }
        
        .card-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .icon-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .icon-btn:hover { color: var(--highlight); transform: scale(1.2); }

        /* --- IDE & ARCHITECT LAYOUTS --- */
        .workspace-layout, .ic-layout { display: flex; height: calc(100vh - 60px); }
        .sidebar { width: 240px; border-right: 1px solid var(--border-dim); background: #0d0d0d; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .editor-area { flex-grow: 1; background: #000; }
        textarea#editor, textarea#architect-editor { width: 100%; height: 100%; background: transparent; color: var(--highlight); border: none; padding: 30px; outline: none; resize: none; font-size: 14px; line-height: 1.6; }

        /* --- MODALS --- */
        #system-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #0a0a0a; border: 1px solid var(--highlight); padding: 30px; width: 400px; text-align: center; }
    </style>
</head>
<body>

    <button class="btn-back-fixed" onclick="exitToPortal()">[ BACK_TO_PORTAL ]</button>

    <div id="boot-screen"></div>

    <div id="hub-layer" class="view-mode">
        <div class="top-nav">
            <div style="font-weight: bold; color: var(--highlight); letter-spacing: 3px; font-size: 1.1rem;">freshC // OMNI_HUB</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-system" onclick="importData()">IMPORT_LIB</button>
                <button class="btn-system" style="border-color:var(--highlight); background:var(--highlight); color:#000;" onclick="createNode()">+ NEW_NODE</button>
            </div>
        </div>
        <div class="project-grid" id="project-grid"></div>
    </div>

    <div id="ide-layer" class="view-mode">
        <div class="top-nav">
            <div id="ide-title" style="color: var(--highlight); font-weight: bold; letter-spacing: 2px;">NODE // CORE</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-system" onclick="closeIDE()"><< HUB</button>
                <button class="btn-system" style="border-color:var(--star-gold); color:var(--star-gold);" onclick="openArchitect()">>> VISUAL_ARCHITECT</button>
            </div>
        </div>
        <div class="workspace-layout">
            <div class="sidebar">
                <div id="page-list"></div>
                <button class="btn-system" style="width:100%; margin-top:10px;" onclick="addPage()">+ ADD_FILE</button>
            </div>
            <div class="editor-area">
                <textarea id="editor" spellcheck="false" oninput="handleEditorInput()"></textarea>
            </div>
        </div>
    </div>

    <script>
        const BOILERPLATE = `<!DOCTYPE html>\n<html><head><style>body{background:#000;color:#0f8;font-family:monospace;}</style></head><body><div id="canvas"><div class="v-box" id="UNIT_1" style="position:absolute;left:50%;top:50%;border:1px solid #0f8;padding:20px;">NODE_ACTIVE</div></div></body></html>`;
        let projects = [];
        let currentIdx = null;
        let currentPage = null;

        function runBoot() {
            const screen = document.getElementById('boot-screen');
            setTimeout(() => { screen.style.opacity = '0'; setTimeout(()=>screen.style.display='none', 600); }, 1200);
            loadStorage();
        }

        function loadStorage() {
            const saved = localStorage.getItem('freshC_v10_data');
            projects = saved ? JSON.parse(saved) : [{ id: Date.now(), title: "CORE_NODE", starred: true, pages: { "index.html": BOILERPLATE } }];
            renderGrid();
        }

        function saveStorage() { localStorage.setItem('freshC_v10_data', JSON.stringify(projects)); }

        function renderGrid() {
            const grid = document.getElementById('project-grid');
            grid.innerHTML = '';
            projects.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = `card ${p.starred ? 'starred' : ''}`;
                card.innerHTML = `<h3>${p.title}</h3><p style="font-size:0.6rem; color:#555;">${Object.keys(p.pages).length} FILES</p>`;
                card.onclick = () => openIDE(i);
                grid.appendChild(card);
            });
        }

        // NAVIGATION LOGIC
        function exitToPortal() {
            // Auto-save before leaving
            if (currentIdx !== null && currentPage) {
                projects[currentIdx].pages[currentPage] = document.getElementById('editor').value;
                saveStorage();
            }
            // Direct redirect keeps session active
            window.location.href = "index.html"; 
        }

        function openIDE(idx) {
            currentIdx = idx;
            currentPage = Object.keys(projects[idx].pages)[0];
            document.getElementById('editor').value = projects[idx].pages[currentPage];
            document.body.classList.add('ide-active');
        }

        function closeIDE() {
            document.body.classList.remove('ide-active');
            currentIdx = null;
        }

        function handleEditorInput() {
            if(currentIdx !== null) {
                projects[currentIdx].pages[currentPage] = document.getElementById('editor').value;
                saveStorage();
            }
        }

        window.onload = runBoot;
    </script>
</body>
</html>
