<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Terminal | freshC</title>
    <style>
        :root {
            --bg-dark: #0a0a0a; --panel-dark: #121212; --text-light: #e0e0e0;
            --text-dim: #888888; --highlight: #00ff88; --border-dim: #333333;
            --font-mono: 'Consolas', 'Courier New', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* HEADER */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--panel-dark); padding: 15px 30px; border-bottom: 2px solid var(--highlight); position: fixed; top: 0; width: 100%; z-index: 100; }
        .dropdown { position: relative; display: inline-block; margin-right: 15px; }
        .dropdown-content { display: none; position: absolute; right: 0; background: var(--panel-dark); min-width: 200px; border: 1px solid var(--highlight); z-index: 101; }
        .dropdown-content a { color: var(--highlight); padding: 12px 16px; text-decoration: none; display: block; font-family: var(--font-mono); font-size: 0.8rem; border-bottom: 1px solid var(--border-dim); }
        .dropdown-content a:hover { background: var(--highlight); color: #000; }
        .dropdown:hover .dropdown-content { display: block; }
        .btn-system { background: transparent; border: 1px solid var(--highlight); color: var(--highlight); padding: 8px 20px; font-family: var(--font-mono); cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-system:hover { background: var(--highlight); color: #000; }

        /* MEMBER CAROUSEL */
        .member-section { padding: 100px 0 40px; background: #121212; border-bottom: 1px solid var(--border-dim); }
        .member-carousel { display: flex; overflow-x: hidden; gap: 20px; padding: 0 80px; cursor: grab; scroll-behavior: smooth; }
        .member-tile { min-width: 180px; background: var(--panel-dark); border: 1px solid var(--border-dim); padding: 15px; text-align: center; transition: 0.3s; opacity: 0.6; }
        .member-tile.active { opacity: 1; border-color: var(--highlight); transform: translateY(-5px); }

        /* PROFILE */
        .profile-container { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 60px 20px; }
        .profile-panel { width: 95%; max-width: 1300px; background: var(--panel-dark); border: 1px solid var(--border-dim); padding: 60px; display: flex; align-items: center; gap: 60px; position: relative; }
        .profile-img { width: 220px; height: 220px; border: 1px solid var(--highlight); display: flex; align-items: center; justify-content: center; font-size: 7rem; color: var(--highlight); background: #000; }
        .profile-info h2 { font-family: var(--font-mono); font-size: 3.5rem; color: var(--highlight); text-transform: uppercase; }

        /* HORIZONTAL PROJECTS */
        .projects-section { 
            width: 100vw; height: 100vh; display: flex; overflow-x: auto; 
            scroll-snap-type: x mandatory; background: #050505; border-top: 2px solid var(--highlight);
            scrollbar-width: none; cursor: grab; touch-action: pan-y;
        }
        .projects-section:active { cursor: grabbing; }
        .projects-section::-webkit-scrollbar { display: none; }
        .project-card { 
            min-width: 100vw; height: 100vh; scroll-snap-align: start; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 60px; text-align: center; flex-shrink: 0; user-select: none;
        }

        /* FOOTER */
        .footer { background: var(--panel-dark); padding: 40px; border-top: 2px solid var(--highlight); }
        .grid { display: none; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .grid.active { display: grid; }
        .contributor-card { background: #000; border: 1px solid var(--border-dim); padding: 20px; border-left: 4px solid var(--highlight); font-family: var(--font-mono); }
        .toast { position: fixed; bottom: 40px; right: 40px; background: var(--highlight); color: black; padding: 15px 30px; display: none; z-index: 1000; font-family: var(--font-mono); font-weight: bold; border: 2px solid #000; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div style="color:var(--highlight); font-family:var(--font-mono); font-weight:bold;">SYSTEM_CORE // freshC</div>
        <div>
            <div class="dropdown">
                <button class="btn-system">New Project ▼</button>
                <div class="dropdown-content">
                    <a href="#" onclick="initiateElectronicKernel()">ELECTRONIC</a>
                    <a href="#" onclick="initiateWebsiteArchitect()">WEBSITE</a>
                    <a href="#" onclick="showToast('LOADING WEBSITE LINES...')">WEBSITE</a>
                    <a href="#" onclick="showToast('ACCESSING BYPASS PROTOCOLS...')">BYPASS IDEAS</a>
                </div>
            </div>
            <button class="btn-system" onclick="lockTerminal()">Lock Terminal</button>
        </div>
    </div>

    <section class="member-section"><div class="member-carousel" id="member-carousel"></div></section>
    <section class="profile-container"><div class="profile-panel" id="profile-panel"></div></section>
    <div class="projects-section" id="projects-wrapper"></div>

    <footer class="footer">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <h4 style="color: var(--highlight);">CONTRIBUTOR_ROSTER</h4>
            <button class="btn-system" id="toggle-btn">Expand Grid</button>
        </div>
        <div class="grid" id="contributor-grid"></div>
    </footer>

    <div id="toast" class="toast">SYSTEM_UPDATE</div>

    <script>
        let members = [], projects = [], contributors = [];
        const sessionID = localStorage.getItem('currentSessionID');

        // CORE REDIRECT FUNCTION
        function initiateElectronicKernel() {
            showToast('DECRYPTING_ELECTRONIC_V5.1...');
            setTimeout(() => {
                // Ensure the filename below matches your V5.1 file exactly
                window.location.href = "master_v5_1.html"; 
            }, 1200);
        }

        async function init() {
            try {
                // NOTE: Replace these with your actual JSON paths or local arrays
                const [m, p, c] = await Promise.all([
                    fetch('members.json').then(r=>r.json()).catch(()=>[]), 
                    fetch('projects.json').then(r=>r.json()).catch(()=>[]), 
                    fetch('contributors.json').then(r=>r.json()).catch(()=>[])
                ]);
                members = m; projects = p; contributors = c;
                render();
            } catch(e) { console.error("Data Fetch Error"); }
        }

        function render() {
            const mWrap = document.getElementById('member-carousel');
            const pWrap = document.getElementById('projects-wrapper');
            const gWrap = document.getElementById('contributor-grid');

            if(members.length > 0) {
                members.forEach((m, i) => {
                    const tile = document.createElement('div');
                    tile.className = `member-tile ${i === 0 ? 'active' : ''}`;
                    tile.innerHTML = `<div>${m.name}</div><div style="font-size:0.7rem; color:var(--highlight)">ID//${m.id}</div>`;
                    tile.onclick = () => updateProfile(i);
                    mWrap.appendChild(tile);
                });
                updateProfile(0);
            }

            projects.forEach(p => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `<div style="font-size:5rem;">${p.icon}</div><h2 style="font-size:3.5rem; color:var(--highlight); font-family:var(--font-mono);">${p.title}</h2><p style="max-width:800px; font-size:1.2rem; margin-top:20px; color:var(--text-dim);">${p.description}</p>`;
                pWrap.appendChild(card);
            });

            contributors.forEach(c => {
                const card = document.createElement('div');
                card.className = 'contributor-card';
                card.innerHTML = `<h5>${c.name}</h5><p>ROLE: ${c.role}</p><p>HANDLE: ${c.handle}</p><p>STATUS: ${c.status}</p>`;
                gWrap.appendChild(card);
            });

            setupSwipeScroll(mWrap); 
            setupSwipeScroll(pWrap); 
        }

        function setupSwipeScroll(el) {
            let isDown = false, startX, scrollLeft;
            el.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; });
            el.addEventListener('mouseleave', () => isDown = false);
            el.addEventListener('mouseup', () => isDown = false);
            el.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - el.offsetLeft;
                const walk = (x - startX) * 2;
                el.scrollLeft = scrollLeft - walk;
            });
        }

        function updateProfile(idx) {
            document.querySelectorAll('.member-tile').forEach((t, i) => t.classList.toggle('active', i === idx));
            const m = members[idx];
            const tag = (m.id === sessionID) ? 
                `<div style="color:var(--highlight); font-size:0.8rem; margin-top:5px;">[ ACTIVE ]</div>` : 
                `<div style="color:var(--text-dim); font-size:0.8rem; margin-top:5px;">[ VERIFIED ]</div>`;
            
            document.getElementById('profile-panel').innerHTML = `
                <div class="profile-img">${m.char}</div>
                <div class="profile-info">
                    <span style="color:var(--text-dim); border-left:3px solid var(--highlight); padding-left:15px;">${m.role} // NODE</span>
                    <h2 style="margin:10px 0;">${m.name}</h2>
                    ${tag}
                    <p style="font-family:var(--font-mono); color:var(--text-dim); margin-top:10px;">ID: ${m.id} authenticated.</p>
                </div>`;
        }

        function lockTerminal() {
    // Create the lock overlay
    const b = document.createElement('div'); 
    b.style.cssText = "position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000; z-index:10000; display:flex; align-items:center; justify-content:center; color:#00ff88; font-family:var(--font-mono); cursor:pointer;";
    b.innerHTML = "<h1>[ TERMINAL_LOCKED ]</h1>"; 
    
    // REDIRECT LOGIC: Change "index.html" to your actual authorization filename
    b.onclick = () => {
        window.location.href = "index.html"; 
    };
    
    document.body.appendChild(b);
}

        document.getElementById('toggle-btn').onclick = function() {
            const grid = document.getElementById('contributor-grid');
            grid.classList.toggle('active');
            this.innerText = grid.classList.contains('active') ? 'Collapse Grid' : 'Expand Grid';
        };

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }
        init();
    </script>
</body>
</html>
